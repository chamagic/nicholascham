        let carouselTimer = null;

        function startCarousel() {
            if (carouselTimer) clearInterval(carouselTimer);
            const slides = document.querySelectorAll('.carousel-slide');
            if (slides.length === 0) return; 
            let currentSlide = 0;
            carouselTimer = setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 5000);
        }

        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        function loadPage(pageName) {
            const bodyContainer = document.getElementById('dynamic-body');
            const navLinks = document.getElementById('navLinks');
            
            if (navLinks) navLinks.classList.remove('active');
            if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }
            
            bodyContainer.classList.add('fade-out');
            setTimeout(() => {
                bodyContainer.innerHTML = pageContent[pageName];
                bodyContainer.classList.remove('fade-out');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (pageName === 'home') startCarousel();
            }, 300);
        }

        window.onload = function() {
            document.getElementById('dynamic-body').innerHTML = pageContent.home;
            startCarousel();
        };

    <!-- Modal Popup Node Overlay Component -->

            document.getElementById('simpleModal').style.display = 'flex';

        function closePopup() {
