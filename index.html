        // 2. Define what pieces go on which page

            home: sections.hero + sections.clients + sections.bio + sections.videos + sections.photos + sections.contact,
            bio: sections.bio,

            contact: sections.contact

        // NEW: Global tracker for the automated rotation loops
        let carouselTimer = null;

        function startCarousel() {
            // Prevent duplicated stacks if clicked repeatedly
            if (carouselTimer) clearInterval(carouselTimer);
            
            // Scan for the images matching your carousel template classes
            const slides = document.querySelectorAll('.carousel-slide');
            if (slides.length === 0) return; 
            
            let currentSlide = 0;

            // Trigger the auto sliding interval rule
            carouselTimer = setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 5000); // Transitions to a new photo every 4 seconds
        }

        // 3. The updated function that handles the smooth fade, swapping, and timer management
        function loadPage(pageName) {
            const bodyContainer = document.getElementById('dynamic-body');
            
            // Turn off carousel timer when leaving home page to maximize frame performance
            if (carouselTimer) {
                clearInterval(carouselTimer);
                carouselTimer = null;
            }
            
            bodyContainer.classList.add('fade-out');

            setTimeout(() => {
                bodyContainer.innerHTML = pageContent[pageName];
                bodyContainer.classList.remove('fade-out');
                window.scrollTo({ top: 0, behavior: 'smooth' });

                // If user returned to home page, restart the slideshow loops
                if (pageName === 'home') {
                    startCarousel();
                }
            }, 300);
        }

        // 4. Run this immediately when the website opens to load home page and kick off the slider loops
        window.onload = function() {
            document.getElementById('dynamic-body').innerHTML = pageContent.home;
            startCarousel();
        };
